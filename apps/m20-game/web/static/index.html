<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="M20 — Survive the dungeon. Post-apocalyptic tabletop RPG.">
  <title>M20 — Escape the Dungeon</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">

    <!-- ── Header ──────────────────────────────────────────────────────── -->
    <header>
      <h1>M20 <span class="subtitle">Escape the Dungeon</span></h1>
      <div id="session-info">
        <span id="char-name-display"></span>
        <span id="char-class-display"></span>
        <span id="hp-display" title="Click to open character sheet" style="cursor:pointer"></span>
      </div>
    </header>

    <!-- ── Create Character ──────────────────────────────────────────────── -->
    <section id="create-section" class="panel">
      <h2>Create Your Survivor</h2>
      <div class="form-row">
        <input id="char-name" type="text" placeholder="Survivor name" maxlength="32" />
        <select id="char-class">
          <option value="">— Random class —</option>
        </select>
        <button id="create-btn" class="btn-primary">Enter the Dungeon</button>
      </div>
      <div id="class-info" class="class-info hidden"></div>
    </section>

    <!-- ── Game Panel ─────────────────────────────────────────────────────── -->
    <section id="game-section" class="panel hidden">

      <!-- Stats bar -->
      <div id="stats-bar" class="stats-bar"></div>

      <!-- Party Bar -->
      <div id="party-bar" class="party-bar hidden">
        <div id="party-slots" class="party-slots"></div>
        <button id="add-party-btn" class="btn-sm">+ Add Survivor</button>
      </div>

      <!-- Map + Tile Draw -->
      <div id="map-section">
        <h2>Map
          <button id="generate-map-btn" class="btn-sm hidden">New Map</button>
          <button id="draw-tile-btn" class="btn-sm">Draw Tiles</button>
        </h2>
        <p class="map-hint">Draw tiles to explore — pick one to place on the map.</p>

        <!-- Tile hand — 2 cards to choose from -->
        <div id="tile-hand" class="tile-hand hidden">
          <div id="tile-hand-cards" class="tile-hand-cards"></div>
        </div>

        <div id="map-grid" class="map-grid"></div>
      </div>

      <!-- Tile panel — building list for selected tile -->
      <div id="tile-panel" class="panel tile-panel hidden">
        <div class="sub-panel-header">
          <h3 id="tile-panel-name"></h3>
          <button id="back-to-map-btn" class="btn-sm">← Map</button>
        </div>
        <p id="tile-panel-desc" class="sub-panel-desc"></p>
        <div id="building-list" class="building-list"></div>
      </div>

      <!-- Building panel — monster group + combat -->
      <div id="building-panel" class="panel building-panel hidden">
        <div class="sub-panel-header">
          <h3 id="bldg-name"></h3>
          <button id="back-to-tile-btn" class="btn-sm">← Buildings</button>
        </div>
        <p id="bldg-description" class="sub-panel-desc"></p>

        <!-- Ollama flavor text -->
        <div id="bldg-flavor" class="flavor-text ai-text"></div>

        <!-- Monster group header -->
        <div class="monster-group-header">
          <strong id="bldg-group-name" class="group-name"></strong>
          <span id="bldg-group-desc" class="group-desc"></span>
        </div>
        <div id="bldg-leader-dialogue" class="leader-dialogue ai-text"></div>

        <!-- Initiative tracker (shown during combat) -->
        <div id="initiative-tracker" class="initiative-tracker hidden">
          <h4>⚡ Initiative Order</h4>
          <div id="initiative-list" class="initiative-list"></div>
        </div>

        <!-- Monster cards list -->
        <div id="monster-group-list" class="monster-group-list"></div>

        <!-- Combat section (hidden until Fight! clicked) -->
        <div id="combat-section" class="combat-section hidden">
          <div class="combat-header">
            <h3>⚔ <span id="combat-monster-name"></span></h3>
          </div>
          <p id="combat-monster-desc" class="combat-desc"></p>
          <div class="hp-bar-container">
            <div id="combat-hp-bar" class="hp-fill hp-high"></div>
          </div>
          <div class="hp-text"><span id="combat-hp-text"></span> HP remaining</div>
          <div id="combat-narration" class="combat-narration"></div>
          <div class="combat-actions">
            <button id="combat-roll-btn" class="btn-primary">Roll Attack</button>
            <button id="combat-flee-btn" class="btn-action">Flee</button>
          </div>
        </div>

        <!-- Fight / cleared state -->
        <div id="fight-section"></div>
      </div>

      <!-- Actions -->
      <div id="action-bar" class="action-bar">
        <button id="scavenge-btn" class="btn-action">Scavenge</button>
        <button id="riddle-btn" class="btn-action btn-ai">Ask the Sphinx 🤖</button>
      </div>

      <!-- Log -->
      <div id="game-log">
        <h3>Journal</h3>
        <div id="log-entries"></div>
      </div>

      <!-- Inventory -->
      <div id="inventory-panel">
        <h3>Inventory <span id="inv-count"></span></h3>
        <div id="inventory-grid" class="inv-grid"></div>
        <div id="craft-section">
          <button id="craft-check-btn" class="btn-sm">Check What I Can Craft</button>
          <div id="craft-results" class="hidden"></div>
        </div>
      </div>

    </section>

    <!-- ── Character Sheet Modal ───────────────────────────────────────────── -->
    <div id="char-sheet-modal" class="char-sheet-modal hidden">
      <div class="char-sheet-inner">
        <div class="char-sheet-header">
          <h2 id="csh-title"></h2>
          <button id="char-sheet-close" class="btn-sm">✕ Close</button>
        </div>

        <!-- Identity: level, XP bar -->
        <div class="csh-section">
          <div id="csh-identity" class="csh-identity"></div>
          <div class="xp-bar-container"><div id="csh-xp-bar" class="xp-fill"></div></div>
          <div class="xp-text" id="csh-xp-text"></div>
        </div>

        <!-- Stats grid -->
        <div class="csh-section">
          <h3>Stats</h3>
          <div id="csh-stats" class="csh-stats-grid"></div>
        </div>

        <!-- Equipment slots -->
        <div class="csh-section">
          <h3>Equipment</h3>
          <div id="csh-equipment" class="csh-equip-slots"></div>
        </div>

        <!-- Inventory grid (4×5) -->
        <div class="csh-section">
          <h3>Inventory <span id="csh-inv-count"></span></h3>
          <div id="csh-inventory-grid" class="inv-grid"></div>
          <div id="csh-craft-results" class="hidden" style="margin-top:10px"></div>
        </div>

        <!-- Craft area in modal -->
        <div class="csh-section">
          <h3>Crafting</h3>
          <div id="csh-craftable-list" class="craftable-list"></div>
        </div>
      </div>
    </div>

    <!-- ── Loading / Error states ─────────────────────────────────────────── -->
    <div id="loading" class="loading hidden">
      <span class="spinner"></span> Working…
    </div>
    <div id="error-banner" class="error-banner hidden"></div>

  </div>

  <script src="/js/jquery-3.7.1.min.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
